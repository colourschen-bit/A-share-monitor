<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>David A股投资监控系统</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #687383;
      --line: #dfe4ea;
      --green: #147d4f;
      --yellow: #a66a00;
      --orange: #b94f00;
      --red: #b42318;
      --black: #252b33;
      --blue: #155eef;
      --shadow: 0 8px 24px rgba(15, 23, 42, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247, 248, 250, .94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      width: min(1480px, calc(100vw - 32px));
      margin: 0 auto;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 18px 0;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button, input, select {
      height: 36px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      font: inherit;
      font-size: 14px;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
      font-weight: 600;
    }

    button.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    input {
      width: 220px;
      padding: 0 10px;
    }

    select { padding: 0 8px; }

    main { padding: 18px 0 28px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .stat b {
      display: block;
      font-size: 24px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 238px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 1180px;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #f2f4f7;
      z-index: 2;
      font-size: 12px;
      color: #4b5563;
    }

    tbody tr:hover { background: #f8fafc; }
    tbody tr.inactive { color: #9aa3af; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .name { font-weight: 700; }
    .muted { color: var(--muted); }

    .badge {
      display: inline-flex;
      align-items: center;
      min-width: 76px;
      justify-content: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .heavy, .ideal { color: var(--green); background: #e8f5ee; border-color: #bae4cf; }
    .first { color: var(--yellow); background: #fff7df; border-color: #f3d48a; }
    .wait { color: #475467; background: #eef2f6; border-color: #d7dde5; }
    .trim { color: var(--orange); background: #fff0e6; border-color: #ffc99f; }
    .exit, .risk { color: var(--red); background: #fff0ee; border-color: #ffccc7; }
    .cash { color: #155eef; background: #edf3ff; border-color: #c9d9ff; }

    .side-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      max-height: 420px;
      overflow: auto;
    }

    .signal-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      align-items: center;
    }

    .signal-item strong { font-size: 14px; }
    .signal-item small { color: var(--muted); }

    .trend {
      padding: 12px;
      border-top: 1px solid var(--line);
    }

    canvas {
      width: 100%;
      height: 140px;
      display: block;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .footnote {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .topbar, .layout { grid-template-columns: 1fr; }
      .controls { justify-content: flex-start; }
      .stats { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      input { width: 100%; }
      .table-wrap { max-height: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>David A股投资监控系统</h1>
        <div class="sub" id="status">等待刷新行情</div>
      </div>
      <div class="controls">
        <input id="search" placeholder="搜索名称 / 代码 / 因子">
        <select id="filter">
          <option value="all">全部标的</option>
          <option value="active">仅启用</option>
          <option value="buy">买入区间</option>
          <option value="near">接近买点</option>
          <option value="sell">止盈/风控</option>
        </select>
        <button id="saveBtn">保存今日快照</button>
        <button id="exportBtn">导出历史</button>
        <button id="clearBtn">清空历史</button>
        <button class="primary" id="refreshBtn">刷新行情</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="stats" id="stats"></section>
    <section class="layout">
      <div class="panel">
        <div class="panel-title">
          <span>观察池</span>
          <span class="muted" id="rowCount"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>标的</th>
                <th>市场</th>
                <th class="num">最新价</th>
                <th class="num">涨跌幅</th>
                <th>信号</th>
                <th>动作</th>
                <th class="num">距第一买点</th>
                <th class="num">第一</th>
                <th class="num">理想</th>
                <th class="num">重仓</th>
                <th class="num">减仓</th>
                <th class="num">清仓</th>
                <th class="num">止损</th>
                <th>核心因子</th>
                <th>启用</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>

      <aside class="panel">
        <div class="panel-title">
          <span>今日重点</span>
          <span class="muted" id="snapshotCount"></span>
        </div>
        <div class="side-list" id="focus"></div>
        <div class="trend">
          <div class="panel-title" style="padding:0 0 10px;border:0;">
            <span>买入区间数量走势</span>
            <span class="muted">本地历史</span>
          </div>
          <canvas id="trendCanvas" width="640" height="280"></canvas>
          <div class="footnote">
            行情来自腾讯公开行情接口。每日快照保存在当前浏览器 localStorage 中；换浏览器或清缓存会丢失历史。
          </div>
        </div>
      </aside>
    </section>
  </main>

      ["SH","688981","SH688981","中芯国际","晶圆代工","5%","0%",65,58,52,90,100,48,60,"国产半导体/成熟制程",false],
      ["SZ","300223","SZ300223","北京君正","存储/MCU","3%","0%",65,58,52,88,100,48,35,"存储周期/车规芯片",false],
      ["SH","603986","SH603986","兆易创新","存储/MCU","4%","0%",95,85,75,130,145,70,35,"存储价格/MCU需求",false],
      ["SZ","002179","SZ002179","中航光电","军工连接器","5%","0%",34,30,27,45,50,25,28,"军工/新能源连接器订单",false],
      ["SZ","002049","SZ002049","紫光国微","特种芯片","4%","0%",60,52,46,82,95,42,35,"特种IC/安全芯片",false],
      ["SZ","300316","SZ300316","晶盛机电","光伏/半导体设备","3%","0%",30,27,24,40,46,22,25,"设备订单/半导体设备",false],
      ["SZ","002920","SZ002920","德赛西威","智能汽车","4%","0%",100,90,80,135,155,75,35,"智能驾驶/座舱订单",false],
      ["SZ","002594","SZ002594","比亚迪","新能源车","5%","0%",230,205,185,310,350,170,25,"销量/电池/出口",false]
    ].map(row => ({
      market: row[0], code: row[1], symbol: row[2], name: row[3], type: row[4],
      targetWeight: row[5], currentWeight: row[6], firstBuy: row[7], idealBuy: row[8],
      heavyBuy: row[9], trimPrice: row[10], exitPrice: row[11], stopPrice: row[12],
      peMax: row[13], coreFactor: row[14], active: row[15], price: null, changePct: null,
      source: 'pending'
    }));

    const STORAGE_KEY = 'david_a_share_monitor_snapshots_v1';
    const rowsEl = document.getElementById('rows');
    const statsEl = document.getElementById('stats');
    const focusEl = document.getElementById('focus');
    const statusEl = document.getElementById('status');
    const rowCountEl = document.getElementById('rowCount');
    const snapshotCountEl = document.getElementById('snapshotCount');

    let state = WATCHLIST.slice();

    function quoteKey(item) {
      if (item.market === 'SH') return 'sh' + item.code;
      if (item.market === 'SZ') return 'sz' + item.code;
      if (item.market === 'HK') return 'hk' + item.code.padStart(5, '0');
      return null;
    }

    function evaluate(item) {
      const price = Number(item.price);
      if (item.market === 'CASH') return { signal: '现金', action: '保留机会资金', cls: 'cash' };
      if (!Number.isFinite(price) || price <= 0) return { signal: '价格异常', action: '检查行情源', cls: 'risk' };
      if (item.stopPrice && price <= item.stopPrice) return { signal: '风控区', action: '暂停买入', cls: 'risk' };
      if (item.heavyBuy && price <= item.heavyBuy) return { signal: '重仓买点', action: '高赔率区', cls: 'heavy' };
      if (item.idealBuy && price <= item.idealBuy) return { signal: '理想买点', action: '可建仓', cls: 'ideal' };
      if (item.firstBuy && price <= item.firstBuy) return { signal: '第一买点', action: '可小仓', cls: 'first' };
      if (item.exitPrice && price >= item.exitPrice) return { signal: '清仓区', action: '强制复核', cls: 'exit' };
      if (item.trimPrice && price >= item.trimPrice) return { signal: '减仓区', action: '分批止盈', cls: 'trim' };
      return { signal: '等待', action: '不操作', cls: 'wait' };
    }

    function distanceToFirst(item) {
      if (!item.price || !item.firstBuy) return null;
      return (item.price - item.firstBuy) / item.firstBuy;
    }

    function fmt(value, digits = 2) {
      if (!Number.isFinite(Number(value))) return '-';
      return Number(value).toFixed(digits);
    }

    function pct(value) {
      if (!Number.isFinite(Number(value))) return '-';
      return (Number(value) * 100).toFixed(1) + '%';
    }

    function filterRows(items) {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const mode = document.getElementById('filter').value;
      return items.filter(item => {
        const ev = evaluate(item);
        const dist = distanceToFirst(item);
        const matches = !q || [item.name, item.code, item.symbol, item.type, item.coreFactor].join(' ').toLowerCase().includes(q);
        if (!matches) return false;
        if (mode === 'active' && !item.active) return false;
        if (mode === 'buy' && !['重仓买点', '理想买点', '第一买点'].includes(ev.signal)) return false;
        if (mode === 'near' && !(Number.isFinite(dist) && dist > 0 && dist <= 0.03)) return false;
        if (mode === 'sell' && !['减仓区', '清仓区', '风控区'].includes(ev.signal)) return false;
        return true;
      });
    }

    function render() {
      const visible = filterRows(state);
      rowsEl.innerHTML = visible.map(item => {
        const ev = evaluate(item);
        const dist = distanceToFirst(item);
        const trClass = item.active ? '' : ' class="inactive"';
        return `<tr${trClass}>
          <td><span class="name">${item.name}</span><br><span class="muted">${item.symbol} · ${item.type}</span></td>
          <td>${item.market}</td>
          <td class="num">${fmt(item.price, item.price && item.price < 2 ? 3 : 2)}</td>
          <td class="num">${item.changePct == null ? '-' : Number(item.changePct).toFixed(2) + '%'}</td>
          <td><span class="badge ${ev.cls}">${ev.signal}</span></td>
          <td>${ev.action}</td>
          <td class="num">${dist == null ? '-' : pct(dist)}</td>
          <td class="num">${fmt(item.firstBuy, item.firstBuy < 2 ? 3 : 2)}</td>
          <td class="num">${fmt(item.idealBuy, item.idealBuy < 2 ? 3 : 2)}</td>
          <td class="num">${fmt(item.heavyBuy, item.heavyBuy < 2 ? 3 : 2)}</td>
          <td class="num">${fmt(item.trimPrice, item.trimPrice < 2 ? 3 : 2)}</td>
          <td class="num">${fmt(item.exitPrice, item.exitPrice < 2 ? 3 : 2)}</td>
          <td class="num">${fmt(item.stopPrice, item.stopPrice < 2 ? 3 : 2)}</td>
          <td>${item.coreFactor}</td>
          <td>${item.active ? 'TRUE' : 'FALSE'}</td>
        </tr>`;
      }).join('');

      const active = state.filter(item => item.active);
      const evals = active.map(item => evaluate(item));
      const buy = evals.filter(e => ['重仓买点', '理想买点', '第一买点'].includes(e.signal)).length;
      const near = active.filter(item => {
        const dist = distanceToFirst(item);
        return Number.isFinite(dist) && dist > 0 && dist <= 0.03;
      }).length;
      const trim = evals.filter(e => ['减仓区', '清仓区'].includes(e.signal)).length;
      const risk = evals.filter(e => e.signal === '风控区' || e.signal === '价格异常').length;
      const loaded = state.filter(item => item.market === 'CASH' || item.price).length;
      statsEl.innerHTML = [
        ['观察池', state.length],
        ['启用', active.length],
        ['买入区间', buy],
        ['接近买点', near],
        ['止盈/复核', trim],
        ['异常/风控', risk],
      ].map(([label, value]) => `<div class="stat"><b>${value}</b><span>${label}</span></div>`).join('');
      rowCountEl.textContent = `${visible.length} / ${state.length}`;
      statusEl.textContent = `已载入 ${loaded}/${state.length} 个标的 · ${new Date().toLocaleString('zh-CN')}`;
      renderFocus();
      renderTrend();
    }

    function renderFocus() {
      const focus = state
        .filter(item => item.active)
        .map(item => ({ item, ev: evaluate(item), dist: distanceToFirst(item) }))
        .filter(x => ['重仓买点', '理想买点', '第一买点', '减仓区', '清仓区', '风控区', '价格异常'].includes(x.ev.signal) || (Number.isFinite(x.dist) && x.dist > 0 && x.dist <= 0.03))
        .sort((a, b) => {
          const rank = { '风控区': 0, '重仓买点': 1, '理想买点': 2, '第一买点': 3, '价格异常': 4, '清仓区': 5, '减仓区': 6 };
          return (rank[a.ev.signal] ?? 9) - (rank[b.ev.signal] ?? 9);
        });
      focusEl.innerHTML = focus.length ? focus.map(({ item, ev, dist }) => `
        <div class="signal-item">
          <div>
            <strong>${item.name}</strong><br>
            <small>${item.symbol} · ${fmt(item.price, item.price && item.price < 2 ? 3 : 2)} · 距第一买点 ${dist == null ? '-' : pct(dist)}</small>
          </div>
          <span class="badge ${ev.cls}">${ev.signal}</span>
        </div>
      `).join('') : '<div class="muted">暂无启用标的进入重点区间。</div>';
    }

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch (_) { return []; }
    }

    function saveHistory(history) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(-260)));
    }

    function saveSnapshot() {
      const today = new Date().toISOString().slice(0, 10);
      const rows = state.map(item => {
        const ev = evaluate(item);
        return { symbol: item.symbol, name: item.name, price: item.price, signal: ev.signal, active: item.active };
      });
      const history = loadHistory().filter(x => x.date !== today);
      history.push({ date: today, rows });
      saveHistory(history);
      render();
    }

    function exportHistory() {
      const blob = new Blob([JSON.stringify(loadHistory(), null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'David_A股投资监控历史_' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearHistory() {
      if (!confirm('确定清空本地历史快照？')) return;
      localStorage.removeItem(STORAGE_KEY);
      render();
    }

    function renderTrend() {
      const canvas = document.getElementById('trendCanvas');
      const ctx = canvas.getContext('2d');
      const history = loadHistory();
      snapshotCountEl.textContent = `${history.length} 天`;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#dfe4ea';
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        const y = 28 + i * 48;
        ctx.beginPath();
        ctx.moveTo(40, y);
        ctx.lineTo(canvas.width - 18, y);
        ctx.stroke();
      }
      if (history.length < 2) {
        ctx.fillStyle = '#687383';
        ctx.font = '24px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.fillText('保存至少两天快照后显示走势', 150, 145);
        return;
      }
      const points = history.map(day => ({
        date: day.date,
        buy: day.rows.filter(r => ['重仓买点', '理想买点', '第一买点'].includes(r.signal)).length
      }));
      const max = Math.max(1, ...points.map(p => p.buy));
      const left = 42, right = canvas.width - 20, top = 24, bottom = canvas.height - 38;
      ctx.strokeStyle = '#155eef';
      ctx.lineWidth = 4;
      ctx.beginPath();
      points.forEach((p, i) => {
        const x = left + (right - left) * (i / Math.max(1, points.length - 1));
        const y = bottom - (bottom - top) * (p.buy / max);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.fillStyle = '#155eef';
      points.forEach((p, i) => {
        const x = left + (right - left) * (i / Math.max(1, points.length - 1));
        const y = bottom - (bottom - top) * (p.buy / max);
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.fillStyle = '#17202a';
      ctx.font = '22px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText(`${points.at(-1).buy} 个`, right - 64, top + 12);
      ctx.fillStyle = '#687383';
      ctx.font = '18px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText(points[0].date, left, canvas.height - 12);
      ctx.fillText(points.at(-1).date, right - 98, canvas.height - 12);
    }

    function loadTencentBatch(keys) {
      return new Promise((resolve, reject) => {
        if (!keys.length) return resolve();
        const script = document.createElement('script');
        script.charset = 'gbk';
        script.src = 'https://qt.gtimg.cn/q=' + keys.join(',');
        script.onload = () => resolve();
        script.onerror = () => reject(new Error('行情接口加载失败'));
        document.head.appendChild(script);
        setTimeout(() => {
          script.remove();
          resolve();
        }, 6000);
      });
    }

    async function refreshQuotes() {
      statusEl.textContent = '正在刷新行情...';
      const quoteItems = state.filter(item => quoteKey(item));
      const keys = quoteItems.map(quoteKey);
      for (let i = 0; i < keys.length; i += 40) {
        await loadTencentBatch(keys.slice(i, i + 40));
      }
      state = state.map(item => {
        if (item.market === 'CASH') return { ...item, price: 1, changePct: 0, source: 'CASH' };
        const key = quoteKey(item);
        const raw = key ? window['v_' + key] : '';
        if (!raw) return { ...item, price: null, source: 'ERROR' };
        const parts = String(raw).split('~');
        const price = Number(parts[3]);
        const prev = Number(parts[4]);
        const changePct = price && prev ? ((price - prev) / prev) * 100 : Number(parts[32]);
        return { ...item, price: price || null, changePct: Number.isFinite(changePct) ? changePct : null, source: 'TENCENT' };
      });
      render();
    }

    document.getElementById('refreshBtn').addEventListener('click', refreshQuotes);
    document.getElementById('saveBtn').addEventListener('click', saveSnapshot);
    document.getElementById('exportBtn').addEventListener('click', exportHistory);
    document.getElementById('clearBtn').addEventListener('click', clearHistory);
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('filter').addEventListener('change', render);

    render();
    refreshQuotes().catch(err => {
      statusEl.textContent = err.message + '，可以稍后重试';
      render();
    });
  </script>
</body>
</html>
